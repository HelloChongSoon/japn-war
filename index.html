html <!DOCTYPE html> <html lang="en"> <head>   <meta charset="utf-8" />   <title>Japan WWII Invasion Timeline</title>   <meta name="viewport" content="width=device-width, initial-scale=1.0" />    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>    <style>     html, body {       margin: 0;       height: 100%;       font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;       background: #05070a;       color: #fff;     }      #map {       height: 100vh;       width: 100vw;     }      .story-panel {       position: absolute;       top: 20px;       left: 20px;       z-index: 999;       width: 360px;       max-width: calc(100vw - 40px);       background: rgba(8, 12, 18, 0.88);       backdrop-filter: blur(14px);       border: 1px solid rgba(255,255,255,0.12);       border-radius: 22px;       padding: 22px;       box-shadow: 0 20px 60px rgba(0,0,0,0.45);     }      .tag {       font-size: 12px;       letter-spacing: 0.12em;       text-transform: uppercase;       color: #ffb86c;       font-weight: 700;       margin-bottom: 10px;     }      h1 {       font-size: 25px;       line-height: 1.1;       margin: 0 0 14px;     }      .year {       font-size: 36px;       font-weight: 800;       color: #ff7b72;       margin-bottom: 6px;     }      .title {       font-size: 18px;       font-weight: 750;       margin-bottom: 10px;     }      .desc {       font-size: 14px;       line-height: 1.55;       color: #c9d1d9;     }      .controls {       position: absolute;       left: 50%;       bottom: 24px;       transform: translateX(-50%);       z-index: 999;       width: min(760px, calc(100vw - 40px));       background: rgba(8, 12, 18, 0.9);       backdrop-filter: blur(14px);       border: 1px solid rgba(255,255,255,0.12);       border-radius: 22px;       padding: 18px;       box-shadow: 0 20px 60px rgba(0,0,0,0.45);     }      input[type="range"] {       width: 100%;       accent-color: #ff7b72;     }      .control-row {       display: flex;       align-items: center;       gap: 12px;       margin-top: 12px;     }      button {       border: none;       border-radius: 999px;       background: #ff7b72;       color: #111;       padding: 10px 18px;       font-weight: 800;       cursor: pointer;     }      .step {       font-size: 13px;       color: #c9d1d9;       flex: 1;     }      .legend {       display: flex;       gap: 14px;       flex-wrap: wrap;       margin-top: 12px;       font-size: 12px;       color: #c9d1d9;     }      .dot {       width: 10px;       height: 10px;       border-radius: 50%;       display: inline-block;       margin-right: 6px;     }      .japan { background: #ff7b72; }     .allied { background: #79c0ff; }     .soviet { background: #a371f7; }      .leaflet-popup-content-wrapper {       background: #111827;       color: #fff;       border-radius: 14px;       border: 1px solid rgba(255,255,255,0.12);     }      .leaflet-popup-tip {       background: #111827;     }      @media (max-width: 700px) {       .story-panel {         top: 12px;         left: 12px;         width: calc(100vw - 64px);         padding: 16px;       }        h1 {         font-size: 20px;       }        .year {         font-size: 28px;       }        .controls {         bottom: 12px;       }     }   </style> </head>  <body>   <div id="map"></div>    <div class="story-panel">     <div class="tag">Interactive WWII Timeline</div>     <h1>Japan’s Invasion, Expansion & Surrender</h1>     <div class="year" id="year"></div>     <div class="title" id="title"></div>     <div class="desc" id="desc"></div>   </div>    <div class="controls">     <input id="slider" type="range" min="0" max="7" value="0" step="1">     <div class="control-row">       <button id="playBtn">Play</button>       <div class="step" id="stepLabel"></div>     </div>     <div class="legend">       <span><i class="dot japan"></i>Japanese expansion / pressure</span>       <span><i class="dot allied"></i>Allied counteroffensive</span>       <span><i class="dot soviet"></i>Soviet offensive</span>     </div>   </div>    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>    <script>     const map = L.map("map", {       zoomControl: false,       worldCopyJump: true     }).setView([20, 125], 4);      L.control.zoom({ position: "topright" }).addTo(map);      L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {       attribution: "&copy; OpenStreetMap &copy; CARTO",       subdomains: "abcd",       maxZoom: 8     }).addTo(map);      const phases = [       {         year: "1931",         title: "Japan occupies Manchuria",         desc: "Japan uses the Mukden Incident as a pretext to invade Manchuria, creating Manchukuo and starting its continental expansion.",         view: [[28, 95], [48, 145]],         japan: [           ["Japan", 36.2, 138.2],           ["Manchuria", 43.8, 125.3]         ],         allied: [],         soviet: [],         routes: [           [[36.2, 138.2], [43.8, 125.3]]         ]       },       {         year: "1937",         title: "Full-scale war in China",         desc: "The conflict escalates into the Second Sino-Japanese War. Japan pushes into Beijing, Shanghai and Nanjing.",         view: [[20, 95], [45, 140]],         japan: [           ["Beijing", 39.9, 116.4],           ["Shanghai", 31.2, 121.5],           ["Nanjing", 32.1, 118.8]         ],         allied: [],         soviet: [],         routes: [           [[36.2, 138.2], [39.9, 116.4]],           [[36.2, 138.2], [31.2, 121.5]],           [[31.2, 121.5], [32.1, 118.8]]         ]       },       {         year: "Dec 1941",         title: "Pearl Harbor and Pacific offensives",         desc: "Japan attacks Pearl Harbor and launches simultaneous offensives across Hong Kong, Malaya, the Philippines and Southeast Asia.",         view: [[-10, 80], [35, -155]],         japan: [           ["Pearl Harbor", 21.36, -157.95],           ["Hong Kong", 22.3, 114.2],           ["Malaya", 3.1, 101.7],           ["Philippines", 14.6, 121.0]         ],         allied: [],         soviet: [],         routes: [           [[36.2, 138.2], [21.36, -157.95]],           [[36.2, 138.2], [22.3, 114.2]],           [[36.2, 138.2], [3.1, 101.7]],           [[36.2, 138.2], [14.6, 121.0]]         ]       },       {         year: "1942",         title: "Japan reaches peak expansion",         desc: "Japan controls or occupies large parts of Southeast Asia and the western Pacific, including Singapore, Burma and the Dutch East Indies.",         view: [[-12, 75], [30, 165]],         japan: [           ["Singapore", 1.35, 103.82],           ["Dutch East Indies", -6.2, 106.8],           ["Burma", 16.8, 96.2],           ["Guam", 13.4, 144.8],           ["Rabaul", -4.2, 152.2]         ],         allied: [],         soviet: [],         routes: [           [[36.2, 138.2], [1.35, 103.82]],           [[1.35, 103.82], [-6.2, 106.8]],           [[3.1, 101.7], [16.8, 96.2]],           [[36.2, 138.2], [13.4, 144.8]],           [[13.4, 144.8], [-4.2, 152.2]]         ]       },       {         year: "Jun 1942",         title: "Turning point at Midway",         desc: "The Battle of Midway weakens Japan’s carrier force and marks a major strategic turning point in the Pacific War.",         view: [[-5, 120], [35, -170]],         japan: [           ["Japan", 36.2, 138.2]         ],         allied: [           ["Midway", 28.2, -177.4]         ],         soviet: [],         routes: [           [[36.2, 138.2], [28.2, -177.4]]         ]       },       {         year: "1943–1944",         title: "Allied island-hopping campaign",         desc: "The Allies begin bypassing heavily defended islands and capturing strategic bases to move closer to Japan.",         view: [[-15, 120], [35, 175]],         japan: [],         allied: [           ["Guadalcanal", -9.6, 160.2],           ["Tarawa", 1.4, 173.0],           ["Saipan", 15.2, 145.7],           ["Philippines", 14.6, 121.0]         ],         soviet: [],         routes: [           [[-9.6, 160.2], [1.4, 173.0]],           [[1.4, 173.0], [15.2, 145.7]],           [[15.2, 145.7], [14.6, 121.0]]         ]       },       {         year: "1945",         title: "Allies close in on Japan",         desc: "Iwo Jima and Okinawa bring Allied forces close to the Japanese home islands, while blockade and bombing intensify.",         view: [[18, 118], [38, 150]],         japan: [           ["Tokyo", 35.7, 139.7]         ],         allied: [           ["Iwo Jima", 24.8, 141.3],           ["Okinawa", 26.2, 127.7]         ],         soviet: [],         routes: [           [[14.6, 121.0], [24.8, 141.3]],           [[24.8, 141.3], [26.2, 127.7]],           [[26.2, 127.7], [35.7, 139.7]]         ]       },       {         year: "Aug–Sep 1945",         title: "Atomic bombs, Soviet invasion and surrender",         desc: "Hiroshima and Nagasaki are bombed. The Soviet Union attacks Japanese forces in Manchuria. Japan announces surrender on 15 August and signs formally on 2 September 1945.",         view: [[25, 105], [48, 145]],         japan: [           ["Hiroshima", 34.4, 132.5],           ["Nagasaki", 32.8, 129.9],           ["Tokyo Bay surrender ceremony", 35.45, 139.75]         ],         allied: [],         soviet: [           ["Soviet offensive into Manchuria", 44.0, 125.0]         ],         routes: [           [[34.4, 132.5], [35.45, 139.75]],           [[32.8, 129.9], [35.45, 139.75]],           [[47.0, 130.0], [44.0, 125.0]]         ]       }     ];      const colors = {       japan: "#ff7b72",       allied: "#79c0ff",       soviet: "#a371f7",       route: "#ffb86c"     };      let layer = L.layerGroup().addTo(map);     let timer = null;      function addMarker(name, lat, lng, color) {       L.circleMarker([lat, lng], {         radius: 8,         color,         fillColor: color,         fillOpacity: 0.95,         weight: 2       })       .bindPopup(`<strong>${name}</strong>`)       .addTo(layer);     }      function update(index) {       const phase = phases[index];       layer.clearLayers();        document.getElementById("year").textContent = phase.year;       document.getElementById("title").textContent = phase.title;       document.getElementById("desc").textContent = phase.desc;       document.getElementById("stepLabel").textContent =         `${index + 1} / ${phases.length}: ${phase.title}`;       document.getElementById("slider").value = index;        phase.routes.forEach(route => {         L.polyline(route, {           color: colors.route,           weight: 3,           opacity: 0.78,           dashArray: "8 10"         }).addTo(layer);       });        phase.japan.forEach(p => addMarker(p[0], p[1], p[2], colors.japan));       phase.allied.forEach(p => addMarker(p[0], p[1], p[2], colors.allied));       phase.soviet.forEach(p => addMarker(p[0], p[1], p[2], colors.soviet));        map.fitBounds(phase.view, {         padding: [45, 45],         animate: true,         duration: 0.8       });     }      document.getElementById("slider").addEventListener("input", e => {       update(Number(e.target.value));     });      document.getElementById("playBtn").addEventListener("click", () => {       const btn = document.getElementById("playBtn");        if (timer) {         clearInterval(timer);         timer = null;         btn.textContent = "Play";         return;       }        btn.textContent = "Pause";        timer = setInterval(() => {         let current = Number(document.getElementById("slider").value);         let next = current + 1;          if (next >= phases.length) {           clearInterval(timer);           timer = null;           btn.textContent = "Play";           return;         }          update(next);       }, 2200);     });      update(0);   </script> </body> </html>
