<!DOCTYPE html> <html lang="en"> <head>   <meta charset="utf-8" />   <title>Japan WWII Expansion Timeline</title>   <meta name="viewport" content="width=device-width, initial-scale=1.0" />   <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>   <style>     body { margin:0; background:#0d1117; color:white; font-family:Arial; }     #map { height:100vh; }     .panel {       position:absolute; top:20px; left:20px;       background:rgba(0,0,0,0.7);       padding:16px; border-radius:12px;       max-width:320px;     }     .controls {       position:absolute; bottom:20px; left:50%;       transform:translateX(-50%);       width:60%;       background:rgba(0,0,0,0.7);       padding:12px; border-radius:12px;     }     input { width:100%; }     button { margin-top:10px; padding:8px 12px; cursor:pointer; }   </style> </head> <body> <div id="map"></div> <div class="panel">   <h2 id="date"></h2>   <h3 id="title"></h3>   <p id="desc"></p> </div> <div class="controls">   <input type="range" id="slider" min="0" max="4" step="1" value="0">   <button onclick="play()">Play</button> </div> <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script> <script> const map = L.map('map').setView([20,120],4); L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {   attribution: '&copy; OpenStreetMap' }).addTo(map); let layer; const phases = [ {   date:"1931–1937",   title:"China Expansion",   desc:"Japan invades Manchuria and expands into China.",   coords:[[35,120],[40,125]] }, {   date:"1941–1942",   title:"Peak Expansion",   desc:"Rapid expansion across Southeast Asia and Pacific.",   coords:[[1,104],[14,121],[21,-157]] }, {   date:"1942–1943",   title:"Turning Point",   desc:"Battle of Midway shifts momentum.",   coords:[[28,-177]] }, {   date:"1943–1945",   title:"Allied Pushback",   desc:"Island hopping strategy closes in on Japan.",   coords:[[14,120],[24,141],[26,127]] }, {   date:"1945",   title:"Surrender",   desc:"Atomic bombs and Soviet invasion force surrender.",   coords:[[35,139]] } ]; function update(i){   if(layer) map.removeLayer(layer);   const p = phases[i];   document.getElementById("date").innerText = p.date;   document.getElementById("title").innerText = p.title;   document.getElementById("desc").innerText = p.desc;   layer = L.layerGroup(     p.coords.map(c => L.circleMarker(c,{       radius:8,color:"red"     }))   ).addTo(map); } document.getElementById("slider").oninput = e => update(e.target.value); let interval; function play(){   let i = 0;   clearInterval(interval);   interval = setInterval(()=>{     update(i);     document.getElementById("slider").value = i;     i++;     if(i>4) clearInterval(interval);   },1500); } update(0); </script> </body> </html>
